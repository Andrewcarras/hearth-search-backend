<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hearth Property Search - Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.1rem; opacity: 0.9; }
        .search-box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }
        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #f0f0f0;
        }
        .card-content { padding: 20px; }
        .price {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }
        .address {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .details {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        .description {
            font-size: 13px;
            color: #777;
            line-height: 1.5;
            max-height: 60px;
            overflow: hidden;
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 40px;
        }
        .error {
            background: #ff4444;
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .stats {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏡 Hearth Property Search</h1>
            <div class="subtitle">AI-Powered Semantic Search Demo</div>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Try: 'modern home with granite countertops and vaulted ceilings'" />
            <button onclick="search()">Search Properties</button>
        </div>

        <div id="stats" class="stats"></div>
        <div id="error"></div>
        <div id="loading" class="loading" style="display: none;">Searching...</div>
        <div id="results" class="results"></div>
    </div>

    <script>
        const API = 'https://mqgsb4xb2g.execute-api.us-east-1.amazonaws.com/prod/search';

        async function search() {
            const query = document.getElementById('searchInput').value;
            if (!query.trim()) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').innerHTML = '';
            document.getElementById('error').innerHTML = '';
            document.getElementById('stats').innerHTML = '';

            try {
                const response = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ q: query, size: 12 })
                });

                const data = await response.json();
                document.getElementById('loading').style.display = 'none';

                if (data.results && data.results.length > 0) {
                    document.getElementById('stats').innerHTML = `Found ${data.total} properties`;
                    displayResults(data.results);
                } else {
                    document.getElementById('error').innerHTML = 'No results found. Try a different search.';
                }
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').innerHTML = `Error: ${error.message}`;
            }
        }

        function displayResults(results) {
            const container = document.getElementById('results');
            results.forEach(listing => {
                const card = document.createElement('div');
                card.className = 'card';

                const img = listing.images && listing.images[0] ? listing.images[0] : '';
                const price = listing.price ? `$${listing.price.toLocaleString()}` : 'Price N/A';
                const address = listing.address?.streetAddress || 'Address N/A';
                const city = listing.address?.city || '';
                const state = listing.address?.state || '';
                const beds = listing.bedrooms || '?';
                const baths = listing.bathrooms || '?';
                const desc = listing.description ? listing.description.substring(0, 150) + '...' : '';

                card.innerHTML = `
                    ${img ? `<img class="card-image" src="${img}" alt="Property" onerror="this.style.display='none'">` : ''}
                    <div class="card-content">
                        <div class="price">${price}</div>
                        <div class="address">${address}</div>
                        <div class="details">${city}, ${state} • ${beds} bed, ${baths} bath</div>
                        <div class="description">${desc}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
