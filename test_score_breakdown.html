<!DOCTYPE html>
<html>
<head>
    <title>Test Score Breakdown</title>
</head>
<body>
    <h1>Testing Score Breakdown API</h1>
    <button onclick="testScoreBreakdown()">Test Score Breakdown</button>
    <div id="results"></div>

    <script>
        async function testScoreBreakdown() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = 'Loading...';

            try {
                console.log('Calling API...');
                const response = await fetch('https://f2o144zh31.execute-api.us-east-1.amazonaws.com/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        q: 'modern home',
                        size: 3,
                        index: 'listings-v2',
                        include_scoring_details: true
                    })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (!data || !data.ok || !data.results) {
                    resultsDiv.innerHTML = '<pre style="color:red;">Invalid response:\n' + JSON.stringify(data, null, 2) + '</pre>';
                    return;
                }

                const firstResult = data.results[0];
                if (!firstResult._scoring_details) {
                    resultsDiv.innerHTML = '<pre style="color:red;">No _scoring_details in result:\n' + JSON.stringify(firstResult, null, 2) + '</pre>';
                    return;
                }

                resultsDiv.innerHTML = '<pre style="color:green;">✅ SUCCESS!\n\nZPID: ' + firstResult.zpid +
                    '\nHas _scoring_details: ' + (firstResult._scoring_details ? 'YES' : 'NO') +
                    '\n\nScoring details keys:\n' + JSON.stringify(Object.keys(firstResult._scoring_details), null, 2) +
                    '\n\nBM25: ' + JSON.stringify(firstResult._scoring_details.bm25, null, 2) +
                    '</pre>';

            } catch (error) {
                console.error('Error:', error);
                resultsDiv.innerHTML = '<pre style="color:red;">Error: ' + error.message + '\n\n' + error.stack + '</pre>';
            }
        }
    </script>
</body>
</html>
